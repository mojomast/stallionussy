# horse.ussyco.de - StallionUSSY horse breeding/racing simulator
# Reverse proxy to stallionussy Go server.
# Default port is 8080. If the service is configured to listen on a different
# port (e.g. STALLIONUSSY_PORT=4200 in /etc/stallionussy/env), update the
# proxy_pass below to match.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name horse.ussyco.de;

    ssl_certificate /etc/letsencrypt/live/ussyco.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ussyco.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to StallionUSSY server
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for race telemetry
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400;
    }
}
