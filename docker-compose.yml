# StallionUSSY: The "Go Brrrr" Deployment
# docker-compose up --build
#
# The yogurt is patient. The yogurt remembers.

services:
  stallionussy:
    build: .
    container_name: stallionussy
    ports:
      - "${STALLIONUSSY_PORT:-8080}:8080"
    environment:
      - STALLIONUSSY_PORT=8080
      - STALLIONUSSY_TICK_DELAY_MS=50
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/stables"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

